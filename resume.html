<!doctype html><html lang="en"><head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Jorge Hinojosa — Portfolio of practical projects, tools, and systems." />
  <title>Contact | Jorge Hinojosa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f4f6f8;
      --surface: #ffffff;
      --surface-alt: #f8f9fa;
      --border: #cfd6df;
      --border-light: #e3e8ef;
      --text-primary: #111827;
      --text-secondary: #4b5563;
      --text-muted: #6b7280;
      --accent: #1e3a5f;
      --accent-hover: #15304f;
      --accent-light: #e9f0f8;
      --tag-bg: #eef2f7;
      --tag-text: #2c4a6e;
      --tag-border: #c8d5e6;
      --code-bg: #f3f4f6;
      --code-text: #374151;
      --cat-cad: #3b6fa0;
      --cat-python: #2a7f6f;
      --cat-powerapps: #b07d2e;
      --cat-default: #5a6a7a;
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text-primary);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* ── Nav ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom: 2px solid var(--accent);
    }

    .nav-inner {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
    }

    .nav-logo {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.01em;
    }

    .nav-links {
      display: flex;
      gap: 28px;
    }

    .nav-links a {
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--text-secondary);
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--accent);
      text-decoration: none;
    }

    /* ── Header / Hero ── */
    header {
      background:
        radial-gradient(circle at top right, rgba(30, 58, 95, 0.08), transparent 34%),
        linear-gradient(180deg, #eef3f8 0%, var(--surface) 100%);
      border-bottom: 1px solid var(--border);
      padding: 48px 0 38px;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 168px;
      gap: 32px;
      align-items: start;
    }

    .hero-name {
      font-size: clamp(2.05rem, 4vw, 2.85rem);
      font-weight: 700;
      line-height: 1.08;
      margin: 0 0 10px;
      color: var(--text-primary);
    }

    .hero-title {
      font-size: 1.05rem;
      font-weight: 500;
      color: var(--text-secondary);
      margin: 0 0 16px;
    }

    .hero-summary {
      font-size: 0.95rem;
      color: var(--text-secondary);
      max-width: 680px;
      line-height: 1.62;
      margin: 0;
    }

    /* ── Education Credential ── */
    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-top: 20px;
      padding: 12px 16px 12px 13px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 4px solid #00205b;
      border-radius: 10px;
      color: var(--text-secondary);
      box-shadow: 0 4px 12px rgba(17, 24, 39, 0.05);
    }
    .education-emblem { display: grid; place-items: center; width: 42px; height: 42px; flex-shrink: 0; border-radius: 50%; background: #00205b; color: #fff; }
    .education-emblem svg { width: 23px; height: 23px; }
    .education-copy { display: flex; flex-direction: column; line-height: 1.25; }
    .education-school { color: #00205b; font-size: 0.95rem; font-weight: 700; }
    .education-degree { margin-top: 2px; font-size: 0.85rem; font-weight: 500; }
    .hero-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 24px;
      padding: 10px 22px;
      background: var(--accent);
      color: #fff;
      font-size: 0.85rem;
      font-weight: 600;
      border-radius: 6px;
      transition: background 0.2s, transform 0.15s;
    }

    .hero-cta:hover {
      background: var(--accent-hover);
      text-decoration: none;
      transform: translateY(-1px);
    }

    .hero-stats {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 14px;
      background: rgba(255, 255, 255, 0.68);
      border: 1px solid var(--border-light);
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(17, 24, 39, 0.05);
    }

    .stat-box {
      text-align: center;
      padding: 14px 18px;
      background: var(--surface-alt);
      border: 1px solid var(--border-light);
      border-radius: 8px;
      min-width: 0;
    }

    .stat-number {
      display: block;
      font-size: 1.45rem;
      font-weight: 700;
      color: var(--accent);
      line-height: 1.2;
    }

    .stat-label {
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    /* ── Contact Bar ── */
    .contact-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 14px 26px;
      margin-top: 22px;
      padding: 12px 0 0;
      border-top: 1px solid var(--border-light);
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      color: var(--text-secondary);
    }

    .contact-item a {
      color: var(--text-secondary);
      transition: color 0.2s;
    }

    .contact-item a:hover { color: var(--accent); }

    .contact-icon {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
      opacity: 0.55;
    }

    /* ── Main ── */
    main { padding: 42px 0 64px; }

    /* ── Section ── */
    .section { margin-bottom: 52px; }

    .section-header {
      margin-bottom: 24px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border-light);
    }

    .section-title {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--text-primary);
      margin: 0 0 4px;
    }

    .section-sub {
      font-size: 0.875rem;
      color: var(--text-muted);
      margin: 0;
    }

    /* ── Project Cards ── */
    .projects {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border-light);
      border-left: 3px solid var(--cat-default);
      border-radius: 8px;
      padding: 20px 22px;
      display: grid;
      grid-template-columns: 1fr 220px;
      gap: 24px;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 18px rgba(17, 24, 39, 0.06);
      border-color: var(--border);
    }

    .card[data-category="cad"]        { border-left-color: var(--cat-cad); }
    .card[data-category="python"]     { border-left-color: var(--cat-python); }
    .card[data-category="powerapps"]  { border-left-color: var(--cat-powerapps); }
    /* ── Technical Interests ── */
    .interest-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 20px; }
    .interest-card { overflow: hidden; background: var(--surface); border: 1px solid var(--border-light); border-radius: 8px; transition: transform 0.2s ease, box-shadow 0.2s ease; }
    .interest-card:hover { transform: translateY(-2px); box-shadow: 0 8px 18px rgba(17, 24, 39, 0.06); }
    .interest-visual { display: grid; place-items: center; min-height: 206px; padding: 20px; background: linear-gradient(135deg, #e9f0f8, #f8f9fa); border-bottom: 1px solid var(--border-light); text-align: center; }
    .interest-visual.diagram { background: linear-gradient(135deg, #edf6f2, #f8f9fa); }
    .interest-placeholder-title { display: block; color: var(--text-secondary); font-size: 0.78rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; }
    .interest-placeholder-path { display: block; max-width: 100%; margin-top: 5px; color: var(--text-muted); font-family: var(--font-mono); font-size: 0.67rem; word-break: break-all; }
    .interest-content { padding: 20px 22px 22px; }
    .interest-content .card-desc { margin-bottom: 14px; }
    .interest-links { display: flex; flex-wrap: wrap; gap: 14px; font-size: 0.78rem; font-weight: 600; }



    .card-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-primary);
      margin: 0 0 8px;
    }

    .card-title a {
      color: var(--text-primary);
      transition: color 0.2s;
    }

    .card-title a:hover {
      color: var(--accent);
      text-decoration: none;
    }

    .card-impact {
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--accent);
      margin: 0 0 8px;
    }

    .card-desc {
      font-size: 0.875rem;
      color: var(--text-secondary);
      margin: 0;
      line-height: 1.6;
    }




    /* ── Featured Work Carousel ── */
    .featured-carousel { position: relative; overflow: hidden; border-radius: 12px; background: #0f1f35; box-shadow: 0 12px 30px rgba(17, 24, 39, 0.12); }
    .featured-slide { position: relative; display: none; min-height: 580px; overflow: hidden; color: #fff; }
    .featured-slide.is-active { display: block; animation: featured-fade 0.45s ease; }
    .featured-slide img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
    .featured-slide::after { position: absolute; inset: 0; background: linear-gradient(90deg, rgba(8, 20, 38, 0.9) 0%, rgba(8, 20, 38, 0.52) 48%, rgba(8, 20, 38, 0.12) 100%); content: ''; }
    .featured-slide-content { position: absolute; z-index: 1; left: 0; bottom: 0; width: min(620px, 80%); padding: 42px 46px 56px; }
    .featured-slide-kicker { margin: 0 0 10px; color: #d6e5f6; font-size: 0.74rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; }
    .featured-slide-title { margin: 0 0 14px; color: #fff; font-size: clamp(2rem, 4.4vw, 3.5rem); line-height: 1.06; letter-spacing: -0.035em; }
    .featured-slide-summary { margin: 0; color: #f1f5f9; font-size: 1rem; line-height: 1.6; }
    .featured-credit { margin-top: 16px; color: #d7e0eb; font-size: 0.7rem; }
    .featured-credit a { color: #fff; text-decoration: underline; text-underline-offset: 2px; }
    .featured-placeholder-slide { display: grid; place-items: center; background: linear-gradient(135deg, #1e3a5f, #0f1f35); }
    .featured-placeholder-slide::after { display: none; }
    .featured-placeholder-slide .featured-slide-content { position: static; width: min(600px, 100%); padding: 46px; text-align: center; }
    .featured-placeholder-slide .featured-slide-kicker { color: #bcd1e8; }
    .featured-carousel-control { position: absolute; z-index: 2; top: 50%; width: 46px; height: 46px; border: 1px solid rgba(255,255,255,0.58); border-radius: 50%; background: rgba(9, 22, 39, 0.52); color: #fff; cursor: pointer; font-size: 1.5rem; line-height: 1; transform: translateY(-50%); transition: background 0.2s, transform 0.2s; }
    .featured-carousel-control:hover, .featured-carousel-control:focus-visible { background: rgba(9, 22, 39, 0.9); outline: 2px solid #fff; outline-offset: 2px; }
    .featured-carousel-control.prev { left: 20px; }
    .featured-carousel-control.next { right: 20px; }
    .featured-carousel-nav { position: absolute; z-index: 2; right: 28px; bottom: 24px; display: flex; gap: 8px; }
    .featured-carousel-dot { width: 34px; height: 4px; padding: 0; border: 0; border-radius: 3px; background: rgba(255,255,255,0.42); cursor: pointer; }
    .featured-carousel-dot.is-active { background: #fff; }
    @keyframes featured-fade { from { opacity: 0.45; } to { opacity: 1; } }
    /* ── Featured Case Studies ── */
    .featured-grid { display: grid; gap: 24px; }
    .featured-case-study { overflow: hidden; background: var(--surface); border: 1px solid var(--border-light); border-radius: 10px; }
    .case-study-copy { padding: 24px 26px 12px; }
    .case-study-kicker { margin: 0 0 6px; color: var(--accent); font-size: 0.72rem; font-weight: 700; letter-spacing: 0.09em; text-transform: uppercase; }
    .case-study-title { margin: 0 0 8px; color: var(--text-primary); font-size: clamp(1.25rem, 2.3vw, 1.65rem); line-height: 1.25; }
    .case-study-note { margin: 0; color: var(--text-secondary); font-size: 0.9rem; }
    .project-gallery { position: relative; margin-top: 14px; }
    .gallery-slide { display: none; min-height: 390px; margin: 0; background: #e8edf2; }
    .gallery-slide.is-active { display: block; }
    .gallery-slide img { display: block; width: 100%; height: 460px; object-fit: cover; }
    .gallery-slide figcaption { padding: 9px 18px; background: #f8f9fa; color: var(--text-muted); font-size: 0.72rem; }
    .gallery-empty-slide { display: grid; place-items: center; padding: 48px 24px; background: linear-gradient(135deg, #e9f0f8, #f8f9fa); color: var(--text-muted); text-align: center; }
    .gallery-empty-slide strong { display: block; color: var(--text-secondary); font-size: 0.85rem; letter-spacing: 0.06em; text-transform: uppercase; }
    .gallery-empty-slide span { display: block; margin-top: 6px; font-family: var(--font-mono); font-size: 0.72rem; }
    .gallery-controls { display: flex; justify-content: space-between; padding: 14px 18px 18px; }
    .gallery-button { min-width: 104px; padding: 9px 14px; border: 1px solid var(--border); border-radius: 6px; background: var(--surface); color: var(--accent); cursor: pointer; font: inherit; font-size: 0.78rem; font-weight: 700; }
    .gallery-button:hover, .gallery-button:focus-visible { border-color: var(--accent); background: var(--accent-light); outline: none; }
    .timeline { position: relative; margin: 4px 0 0 8px; padding: 0 0 0 30px; border-left: 2px solid var(--border); }
    .timeline-entry { position: relative; padding: 0 0 34px; }
    .timeline-entry::before { position: absolute; left: -39px; top: 4px; width: 14px; height: 14px; border: 3px solid var(--surface); border-radius: 50%; background: var(--accent); box-shadow: 0 0 0 1px var(--border); content: ''; }
    .timeline-date { margin: 0 0 4px; color: var(--accent); font-family: var(--font-mono); font-size: 0.72rem; font-weight: 700; }
    .timeline-entry h3 { margin: 0 0 8px; font-size: 1rem; }
    .timeline-entry p { margin: 0; color: var(--text-secondary); font-size: 0.86rem; }
    .timeline-projects { display: grid; gap: 8px; margin-top: 14px; }
    .timeline-project { padding: 11px 13px; border: 1px solid var(--border-light); border-radius: 6px; background: var(--surface-alt); color: var(--text-secondary); font-size: 0.83rem; }
    .timeline-project strong { display: block; margin-bottom: 2px; color: var(--text-primary); }
    /* ── Featured Work Placeholders ── */
    .featured-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 16px; }
    .featured-placeholder { min-height: 214px; padding: 22px; display: flex; flex-direction: column; justify-content: center; background: var(--surface); border: 1px dashed var(--border); border-radius: 8px; color: var(--text-muted); }
    .featured-placeholder-number { color: var(--accent); font-family: var(--font-mono); font-size: 0.72rem; font-weight: 700; letter-spacing: 0.08em; }
    .featured-placeholder h3 { margin: 10px 0 6px; color: var(--text-primary); font-size: 1rem; }
    .featured-placeholder p { margin: 0; font-size: 0.83rem; line-height: 1.55; }
    .demo-placeholder { cursor: default; }
    .demo-placeholder::after { content: 'Evidence coming soon'; opacity: 0.85; }
    .demo-placeholder:hover { border-color: var(--border-light); background: var(--code-bg); }
    /* ── Demo Box ── */
    .demo-box {
      border: 1px solid var(--border-light);
      border-radius: 6px;
      background: var(--code-bg);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 8px;
      padding: 16px 12px;
      text-align: center;
      min-height: 145px;
      transition: border-color 0.2s;
    }

    .card:hover .demo-box { border-color: var(--border); }

    .demo-label {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .demo-icon {
      width: 32px;
      height: 32px;
      opacity: 0.3;
    }

    .demo-path {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      color: var(--code-text);
      word-break: break-all;
    }



    /* ── Demo Modal ── */
    .demo-box {
      cursor: pointer;
      position: relative;
    }

    .demo-box:hover,
    .demo-box:focus-visible {
      border-color: var(--accent);
      background: #eef3f9;
      outline: none;
    }

    .demo-box::after {
      content: 'Click to enlarge';
      position: absolute;
      bottom: 10px;
      right: 12px;
      font-size: 0.64rem;
      font-weight: 600;
      color: var(--accent);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .demo-box:hover::after,
    .demo-box:focus-visible::after {
      opacity: 0.85;
    }

    .demo-modal {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(17, 24, 39, 0.76);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    .demo-modal.is-open {
      display: flex;
    }

    .demo-modal-panel {
      width: min(960px, 100%);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.28);
      overflow: hidden;
    }

    .demo-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border-light);
    }

    .demo-modal-title {
      margin: 0;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text-primary);
    }

    .demo-modal-close {
      border: 1px solid var(--border-light);
      background: var(--surface-alt);
      color: var(--text-primary);
      border-radius: 6px;
      width: 34px;
      height: 34px;
      font-size: 1.25rem;
      line-height: 1;
      cursor: pointer;
    }

    .demo-modal-close:hover,
    .demo-modal-close:focus-visible {
      border-color: var(--accent);
      outline: none;
    }

    .demo-modal-body {
      padding: 16px;
      background: #0f172a;
    }

    .demo-modal-video {
      display: block;
      width: 100%;
      max-height: 72vh;
      background: #020617;
      border-radius: 6px;
    }

    .demo-modal-note {
      margin: 10px 0 0;
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: #cbd5e1;
      word-break: break-all;
    }

    /* ── Skills ── */
    .skills-categories {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
    }

    .skill-group {
      background: var(--surface);
      border: 1px solid var(--border-light);
      border-radius: 8px;
      padding: 21px 22px;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .skill-group:hover {
      transform: translateY(-1px);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
    }

    .skill-group-title {
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--accent);
      margin: 0 0 12px;
    }

    .skills-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .skill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--surface-alt);
      border: 1px solid var(--border-light);
      border-radius: 4px;
      padding: 6px 10px;
      font-size: 0.78rem;
      color: var(--text-secondary);
      font-weight: 500;
      transition: border-color 0.2s, background 0.2s;
    }

    .skill:hover {
      border-color: var(--accent);
      background: var(--accent-light);
    }

    .skill::before {
      content: '';
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
    }

    /* ── Contact Section ── */
    .contact-section {
      background: linear-gradient(135deg, #e9eef5 0%, var(--surface) 60%);
      border: 1px solid var(--border-light);
      border-radius: 8px;
      padding: 36px 32px;
      text-align: center;
    }

    .contact-section h2 {
      font-size: 1.3rem;
      font-weight: 700;
      margin: 0 0 8px;
    }

    .contact-section p {
      font-size: 0.9rem;
      color: var(--text-secondary);
      margin: 0 0 24px;
      max-width: 480px;
      margin-left: auto;
      margin-right: auto;
    }
